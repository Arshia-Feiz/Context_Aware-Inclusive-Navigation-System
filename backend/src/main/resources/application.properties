# Server config
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/navigation_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging - disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Batch insert optimization (speeds up initial data loading)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# CORS – set to your Appsmith / frontend origin in production
app.cors.allowed-origins=*

# Logging
logging.level.com.group2.navigation=DEBUG
